name: Gravesown Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Java 21
        uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: '21'
          cache: gradle

      - name: Prepare dependencies
        shell: cmd
        run: setup.cmd

      - name: Build release bundle
        shell: cmd
        run: package-release.cmd

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = @(
            (Get-ChildItem -LiteralPath dist -Filter *.jar).FullName
            (Get-ChildItem -LiteralPath release -Filter *.zip).FullName
          )
          gh release create $env:GITHUB_REF_NAME @assets --generate-notes --title "Gravesown $env:GITHUB_REF_NAME"
