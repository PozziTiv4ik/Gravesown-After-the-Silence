name: Gravesown CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Java 21
        uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: '21'
          cache: gradle

      - name: Prepare dependencies
        shell: cmd
        run: setup.cmd

      - name: Verify GitHub-ready project
        shell: cmd
        run: github-ready.cmd

      - name: Build portable Windows bundle
        shell: cmd
        run: package-release.cmd

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gravesown-${{ github.sha }}
          if-no-files-found: error
          path: |
            dist/*.jar
            release/*.zip
